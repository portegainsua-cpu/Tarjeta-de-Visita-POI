<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pablo Ortega Insúa | Especialista en IA y Automatización</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: #ffffff;
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 360px;
            width: 100%;
            border-top: 5px solid #3b82f6; /* Detalle azul tecnológico */
        }
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #3b82f6;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.2);
        }
        h1 {
            font-size: 24px;
            margin: 10px 0 5px 0;
            color: #0f172a; /* Azul muy oscuro para el nombre */
            font-weight: 700;
        }
        .subtitle {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #3b82f6; /* Azul corporativo */
            margin-bottom: 15px;
        }
        .description {
            font-size: 15px;
            color: #64748b;
            line-height: 1.5;
            margin-top: 0;
            margin-bottom: 25px;
        }
        .btn {
            display: block;
            background-color: #0f172a; /* Botón primario serio/elegante */
            color: white;
            padding: 12px;
            margin: 12px 0;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(15, 23, 42, 0.1);
        }
        .btn:hover {
            background-color: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(15, 23, 42, 0.15);
        }
        .btn-highlight {
            background-color: #3b82f6; /* Botón de contacto llamativo */
        }
        .btn-highlight:hover {
            background-color: #2563eb;
            box-shadow: 0 6px 12px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body>

    <div class="card">
       
        <img src="perfil.png" alt="Pablo Ortega Insúa" class="profile-img">
        
        <h1>Pablo Ortega Insúa</h1>
        <div class="subtitle">IA & Automatización No-Code</div>
        
        <p class="description">Ayudo a empresas a optimizar tiempo y reducir costes diseñando ecosistemas inteligentes y automatizaciones eficientes.</p>

        <a href="mailto:portegainsprofesional@gmail.com" class="btn">Escríbeme por Email</a>
        <a href="https://cal.com/pablo-ortega-insua-wdoysa" target="_blank" class="btn btn-highlight">Reserva una cita conmigo 📅</a>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSdrmzbmogeYnWFf9AwoHH5opwxhzkVPNFdCpysFdugMTDJw6Q/viewform?usp=publish-editor" target="_blank" class="btn btn-highlight">Automatiza tu Negocio 🚀</a>

</body>
</html>
